name: CI Audit & Docker Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: CI audit pipeline
        working-directory: backend
        run: |
          python scripts/ci_audit_pipeline.py

      - name: Docker build (prod image)
        working-directory: backend
        run: |
          docker build -t finderos-backend:prod .
