<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SOAR B2B — Appointment Notification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-night-blue: ***REMOVED***0F172A;
            --color-off-white: ***REMOVED***F8FAFC;
            --color-gold: ***REMOVED***D4AF37;
            --color-text-primary: ***REMOVED***0F172A;
            --color-text-secondary: ***REMOVED***475569;
            --color-border: ***REMOVED***E2E8F0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-night-blue);
            color: var(--color-off-white);
            line-height: 1.7;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .mono {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }

        .notification-container {
            max-width: 480px;
            width: 100%;
            background: rgba(248, 250, 252, 0.05);
            border: 1px solid rgba(248, 250, 252, 0.1);
            border-radius: 2px;
            padding: 2rem;
            position: relative;
            animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .notification-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .notification-icon {
            width: 48px;
            height: 48px;
            background: var(--color-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .notification-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-off-white);
            line-height: 1.2;
        }

        .notification-body {
            margin-bottom: 2rem;
        }

        .notification-message {
            font-size: 1rem;
            color: rgba(248, 250, 252, 0.8);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .appointment-details {
            background: rgba(248, 250, 252, 0.03);
            border: 1px solid rgba(248, 250, 252, 0.1);
            border-radius: 2px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(248, 250, 252, 0.1);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 0.85rem;
            color: rgba(248, 250, 252, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .detail-value {
            font-size: 1rem;
            color: var(--color-off-white);
            font-weight: 500;
            text-align: right;
        }

        .detail-value.mono {
            font-family: 'JetBrains Mono', monospace;
            color: var(--color-gold);
        }

        .notification-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn {
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .btn-primary {
            background: var(--color-gold);
            color: var(--color-night-blue);
        }

        .btn-primary:hover {
            background: ***REMOVED***C19D2D;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--color-off-white);
            border: 1px solid rgba(248, 250, 252, 0.3);
        }

        .btn-secondary:hover {
            border-color: var(--color-off-white);
            background: rgba(248, 250, 252, 0.05);
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            color: rgba(248, 250, 252, 0.6);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: rgba(248, 250, 252, 0.1);
            color: var(--color-off-white);
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--color-gold);
            color: var(--color-night-blue);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 2px;
            margin-bottom: 1rem;
        }

        @media (max-width: 480px) {
            .notification-container {
                padding: 1.5rem;
            }

            .notification-title {
                font-size: 1.25rem;
            }

            .btn {
                padding: 0.875rem 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="notification-container" id="notification">
        <button class="close-btn" onclick="closeNotification()" aria-label="Close">×</button>
        
        <div class="notification-header">
            <div class="notification-icon">✓</div>
            <div>
                <div class="badge">New Appointment</div>
                <h1 class="notification-title">Meeting Scheduled</h1>
            </div>
        </div>

        <div class="notification-body">
            <p class="notification-message">
                You have a new appointment scheduled. The meeting details are ready for review.
            </p>

            <div class="appointment-details">
                <div class="detail-row">
                    <span class="detail-label">Lead Name</span>
                    <span class="detail-value" id="leadName">John Smith</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Company</span>
                    <span class="detail-value" id="companyName">Acme Corporation</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Date & Time</span>
                    <span class="detail-value mono" id="scheduledAt">Dec 20, 2024 at 2:00 PM</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Duration</span>
                    <span class="detail-value" id="duration">30 minutes</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Location</span>
                    <span class="detail-value" id="location">Virtual (Google Meet)</span>
                </div>
            </div>
        </div>

        <div class="notification-actions">
            <a href="***REMOVED***" class="btn btn-primary" id="addToCalendarBtn" onclick="addToCalendar(event)">
                Add to Calendar
            </a>
            <a href="***REMOVED***" class="btn btn-secondary" id="viewDetailsBtn" onclick="viewDetails(event)">
                View Details
            </a>
        </div>
    </div>

    <script>
        // Sample appointment data (in production, this would come from the backend/API)
        const appointmentData = {
            leadName: 'John Smith',
            companyName: 'Acme Corporation',
            scheduledAt: new Date('2024-12-20T14:00:00'),
            duration: 30,
            location: 'Virtual (Google Meet)',
            meetLink: 'https://meet.google.com/abc-defg-hij',
            appointmentId: 123
        };

        function formatDate(date) {
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const month = months[date.getMonth()];
            const day = date.getDate();
            const year = date.getFullYear();
            let hours = date.getHours();
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            return `${month} ${day}, ${year} at ${hours}:${minutes} ${ampm}`;
        }

        function formatDuration(minutes) {
            if (minutes < 60) {
                return `${minutes} minutes`;
            }
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return mins > 0 ? `${hours}h ${mins}m` : `${hours} hour${hours > 1 ? 's' : ''}`;
        }

        // Populate notification with data
        function populateNotification(data) {
            document.getElementById('leadName').textContent = data.leadName;
            document.getElementById('companyName').textContent = data.companyName;
            document.getElementById('scheduledAt').textContent = formatDate(data.scheduledAt);
            document.getElementById('duration').textContent = formatDuration(data.duration);
            document.getElementById('location').textContent = data.location;
        }

        function addToCalendar(event) {
            event.preventDefault();
            
            // Create Google Calendar link
            const startDate = appointmentData.scheduledAt;
            const endDate = new Date(startDate.getTime() + appointmentData.duration * 60000);
            
            const formatForGoogle = (date) => {
                return date.toISOString().replace(/-|:|\.\d\d\d/g, '');
            };

            const title = encodeURIComponent(`Meeting with ${appointmentData.leadName}`);
            const details = encodeURIComponent(`Meeting with ${appointmentData.leadName} from ${appointmentData.companyName}`);
            const location = encodeURIComponent(appointmentData.location);
            const start = formatForGoogle(startDate);
            const end = formatForGoogle(endDate);

            const googleCalendarUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}&location=${location}`;

            window.open(googleCalendarUrl, '_blank');
        }

        function viewDetails(event) {
            event.preventDefault();
            // Navigate to appointment details page or dashboard
            window.location.href = `soarb2b_home.html***REMOVED***appointment-${appointmentData.appointmentId}`;
        }

        function closeNotification() {
            const notification = document.getElementById('notification');
            notification.style.animation = 'slideOut 0.3s ease-out forwards';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 300);
        }

        // Add slideOut animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideOut {
                from {
                    opacity: 1;
                    transform: translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateY(-20px);
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize with sample data
        populateNotification(appointmentData);

        // Auto-close after 10 seconds (optional)
        // setTimeout(closeNotification, 10000);
    </script>
</body>
</html>
