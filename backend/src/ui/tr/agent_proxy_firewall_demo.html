<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ajan Vekil Güvenlik Duvarı — FinderOS / SOAR B2B</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: ***REMOVED***0f172a; color: ***REMOVED***f8fafc; }
    pre { background: ***REMOVED***020617; padding: 12px; border-radius: 8px; overflow: auto; max-height: 520px; font-size: 11px; }
    button { margin: 8px 8px 0 0; padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; background: ***REMOVED***9f1239; color: ***REMOVED***fff; }
    .muted { color: ***REMOVED***94a3b8; font-size: 14px; margin-top: 8px; }
    .card { margin-top: 16px; padding: 12px; border-radius: 8px; background: ***REMOVED***1e293b; border: 1px solid ***REMOVED***334155; }
  </style>
</head>
<body>
  <h1>Ajan vekil güvenlik duvarı (H-039)</h1>
  <p class="muted">Çift yönlü süzgeç zincirleri, politika müdahalesi, korumalı eylemler, izler. Salt okunur yönetişim manifestleri.</p>
  <button type="button" id="gBtn">GET gateways</button>
  <button type="button" id="iBtn">GET input-filters</button>
  <button type="button" id="oBtn">GET output-filters</button>
  <button type="button" id="pBtn">GET policies</button>
  <button type="button" id="aBtn">GET protected-actions</button>
  <button type="button" id="tBtn">GET interception-traces</button>
  <div class="card"><h2>Çıktı</h2><pre id="out">(boşta)</pre></div>
  <script>
    const base = "";
    function get(p) { return fetch(base + p).then(r => r.json()); }
    document.getElementById("gBtn").onclick = async () => {
      document.getElementById("out").textContent = JSON.stringify(await get("/api/v1/system/firewall/gateways"), null, 2);
    };
    document.getElementById("iBtn").onclick = async () => {
      document.getElementById("out").textContent = JSON.stringify(await get("/api/v1/system/firewall/input-filters"), null, 2);
    };
    document.getElementById("oBtn").onclick = async () => {
      document.getElementById("out").textContent = JSON.stringify(await get("/api/v1/system/firewall/output-filters"), null, 2);
    };
    document.getElementById("pBtn").onclick = async () => {
      document.getElementById("out").textContent = JSON.stringify(await get("/api/v1/system/firewall/policies"), null, 2);
    };
    document.getElementById("aBtn").onclick = async () => {
      document.getElementById("out").textContent = JSON.stringify(await get("/api/v1/system/firewall/protected-actions"), null, 2);
    };
    document.getElementById("tBtn").onclick = async () => {
      document.getElementById("out").textContent = JSON.stringify(await get("/api/v1/system/firewall/interception-traces"), null, 2);
    };
  </script>
</body>
</html>
