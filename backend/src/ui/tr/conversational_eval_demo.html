<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Konuşma Değerlendirme Demo — H-048</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: ***REMOVED***0b1220; color: ***REMOVED***f8fafc; }
    button { margin: 6px 8px 0 0; padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; background: ***REMOVED***f97316; color: ***REMOVED***140a02; font-size: 12px; }
    pre { background: ***REMOVED***020617; padding: 12px; border-radius: 8px; overflow: auto; max-height: 520px; font-size: 10px; }
    .muted { color: ***REMOVED***94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Konuşma değerlendirme demo (H-048)</h1>
  <p class="muted">Çok turlu yönetişim görünürlüğü: oturumlar, izler, politika uyumu, tur bazlı analiz. Deterministik, denetlenebilir.</p>
  <div>
    <button type="button" data-p="/api/v1/system/conversation-eval/sessions">sessions</button>
    <button type="button" data-p="/api/v1/system/conversation-eval/traces">traces</button>
    <button type="button" data-p="/api/v1/system/conversation-eval/policy-alignment">policy alignment</button>
    <button type="button" data-p="/api/v1/system/conversation-eval/turn-analysis">turn analysis</button>
  </div>
  <pre id="out">(idle)</pre>
  <script>
    document.querySelectorAll("button[data-p]").forEach(function (btn) {
      btn.onclick = function () {
        fetch(btn.getAttribute("data-p"))
          .then(function (r) { return r.json(); })
          .then(function (j) { document.getElementById("out").textContent = JSON.stringify(j, null, 2); });
      };
    });
  </script>
</body>
</html>
