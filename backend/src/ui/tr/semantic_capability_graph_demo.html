<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Semantic Capability Graph — FinderOS / SOAR B2B</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: ***REMOVED***0f172a; color: ***REMOVED***f8fafc; }
    pre { background: ***REMOVED***020617; padding: 12px; border-radius: 8px; overflow: auto; max-height: 520px; font-size: 11px; }
    button { margin: 8px 8px 0 0; padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; background: ***REMOVED***6d28d9; color: ***REMOVED***fff; }
    .muted { color: ***REMOVED***94a3b8; font-size: 14px; margin-top: 8px; }
    .card { margin-top: 16px; padding: 12px; border-radius: 8px; background: ***REMOVED***1e293b; border: 1px solid ***REMOVED***334155; }
  </style>
</head>
<body>
  <h1>Semantic capability graph (H-034)</h1>
  <p class="muted">H-020 manifest + graph alt rotaları (topology, contracts).</p>
  <button type="button" id="tBtn">GET topology</button>
  <button type="button" id="cBtn">GET contracts</button>
  <div class="card"><h2>Çıktı</h2><pre id="out">(idle)</pre></div>
  <script>
    const base = "";
    document.getElementById("tBtn").onclick = async () => {
      const r = await fetch(base + "/api/v1/system/capabilities/topology");
      document.getElementById("out").textContent = JSON.stringify(await r.json(), null, 2);
    };
    document.getElementById("cBtn").onclick = async () => {
      const r = await fetch(base + "/api/v1/system/capabilities/contracts");
      document.getElementById("out").textContent = JSON.stringify(await r.json(), null, 2);
    };
  </script>
</body>
</html>
