<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ajan Kimlik Yönetişimi Demo — H-049</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: ***REMOVED***0b1220; color: ***REMOVED***f8fafc; }
    button { margin: 6px 8px 0 0; padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; background: ***REMOVED***a78bfa; color: ***REMOVED***140a24; font-size: 12px; }
    pre { background: ***REMOVED***020617; padding: 12px; border-radius: 8px; overflow: auto; max-height: 520px; font-size: 10px; }
    .muted { color: ***REMOVED***94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Ajan kimlik yönetişimi demo (H-049)</h1>
  <p class="muted">Kimlik registry, erişim politikaları, audit, bütçeler, shadow-agent tespiti, MCP endpoint yönetişimi (sadece metadata).</p>
  <div>
    <button type="button" data-p="/api/v1/system/identity/registry">registry</button>
    <button type="button" data-p="/api/v1/system/identity/policies">policies</button>
    <button type="button" data-p="/api/v1/system/identity/audit">audit</button>
    <button type="button" data-p="/api/v1/system/identity/budgets">budgets</button>
    <button type="button" data-p="/api/v1/system/identity/shadow-agents">shadow agents</button>
    <button type="button" data-p="/api/v1/system/identity/mcp-governance">mcp governance</button>
  </div>
  <pre id="out">(idle)</pre>
  <script>
    document.querySelectorAll("button[data-p]").forEach(function (btn) {
      btn.onclick = function () {
        fetch(btn.getAttribute("data-p"))
          .then(function (r) { return r.json(); })
          .then(function (j) { document.getElementById("out").textContent = JSON.stringify(j, null, 2); });
      };
    });
  </script>
</body>
</html>
