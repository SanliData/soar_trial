<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Semantic Capability Graph — FinderOS / SOAR B2B</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: ***REMOVED***0f172a; color: ***REMOVED***f8fafc; }
    pre { background: ***REMOVED***020617; padding: 12px; border-radius: 8px; overflow: auto; max-height: 520px; font-size: 11px; }
    button { margin: 8px 8px 0 0; padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; background: ***REMOVED***6d28d9; color: ***REMOVED***fff; }
    .muted { color: ***REMOVED***94a3b8; font-size: 14px; margin-top: 8px; }
    .card { margin-top: 16px; padding: 12px; border-radius: 8px; background: ***REMOVED***1e293b; border: 1px solid ***REMOVED***334155; }
    .note { font-size: 13px; color: ***REMOVED***a5b4fc; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h1>Semantic capability graph (H-034)</h1>
  <p class="note">Flat H-020 manifest: <code>GET /api/v1/system/capabilities</code> — includes <code>semantic_capability_graph</code> extension.</p>
  <p class="muted">Sub-routes: graph registry, topology, contracts, awareness, runtime snapshot.</p>
  <button type="button" id="hBtn">GET H-020 catalog (check extension)</button>
  <button type="button" id="gBtn">GET graph registry</button>
  <button type="button" id="tBtn">GET topology</button>
  <button type="button" id="cBtn">GET contracts</button>
  <button type="button" id="aBtn">GET awareness</button>
  <button type="button" id="rBtn">GET runtime-context</button>
  <div class="card"><h2>Output</h2><pre id="out">(idle)</pre></div>
  <script>
    const base = "";
    document.getElementById("hBtn").onclick = async () => {
      const r = await fetch(base + "/api/v1/system/capabilities");
      document.getElementById("out").textContent = JSON.stringify(await r.json(), null, 2);
    };
    document.getElementById("gBtn").onclick = async () => {
      const r = await fetch(base + "/api/v1/system/capabilities/graph");
      document.getElementById("out").textContent = JSON.stringify(await r.json(), null, 2);
    };
    document.getElementById("tBtn").onclick = async () => {
      const r = await fetch(base + "/api/v1/system/capabilities/topology");
      document.getElementById("out").textContent = JSON.stringify(await r.json(), null, 2);
    };
    document.getElementById("cBtn").onclick = async () => {
      const r = await fetch(base + "/api/v1/system/capabilities/contracts");
      document.getElementById("out").textContent = JSON.stringify(await r.json(), null, 2);
    };
    document.getElementById("aBtn").onclick = async () => {
      const r = await fetch(base + "/api/v1/system/capabilities/awareness");
      document.getElementById("out").textContent = JSON.stringify(await r.json(), null, 2);
    };
    document.getElementById("rBtn").onclick = async () => {
      const r = await fetch(base + "/api/v1/system/capabilities/runtime-context");
      document.getElementById("out").textContent = JSON.stringify(await r.json(), null, 2);
    };
  </script>
</body>
</html>
