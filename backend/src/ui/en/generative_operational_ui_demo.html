<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Generative Operational UI Demo — H-048</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: ***REMOVED***08131c; color: ***REMOVED***f8fafc; }
    button { margin: 6px 8px 0 0; padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; background: ***REMOVED***22c55e; color: ***REMOVED***04120a; font-size: 12px; }
    pre { background: ***REMOVED***020617; padding: 12px; border-radius: 8px; overflow: auto; max-height: 520px; font-size: 10px; }
    .muted { color: ***REMOVED***94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Generative operational UI demo (H-048)</h1>
  <p class="muted">Registry-only component projection. No arbitrary HTML/JS generation, no executable payload injection.</p>
  <div>
    <button type="button" data-p="/api/v1/system/generative-ui/components">components</button>
    <button type="button" data-p="/api/v1/system/generative-ui/dashboards">dashboards</button>
    <button type="button" data-p="/api/v1/system/generative-ui/charts">charts</button>
    <button type="button" data-p="/api/v1/system/generative-ui/graphs">graphs</button>
  </div>
  <pre id="out">(idle)</pre>
  <script>
    document.querySelectorAll("button[data-p]").forEach(function (btn) {
      btn.onclick = function () {
        fetch(btn.getAttribute("data-p"))
          .then(function (r) { return r.json(); })
          .then(function (j) { document.getElementById("out").textContent = JSON.stringify(j, null, 2); });
      };
    });
  </script>
</body>
</html>
