<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Adaptive Clustering Demo — H-049</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: ***REMOVED***0b1020; color: ***REMOVED***f8fafc; }
    button { margin: 6px 8px 0 0; padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; background: ***REMOVED***60a5fa; color: ***REMOVED***06101f; font-size: 12px; }
    pre { background: ***REMOVED***020617; padding: 12px; border-radius: 8px; overflow: auto; max-height: 520px; font-size: 10px; }
    .muted { color: ***REMOVED***94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Adaptive clustering demo (H-049)</h1>
  <p class="muted">Breathing cycles, utility scoring, variance/stability, and runtime optimization proposals (deterministic, metadata-only).</p>
  <div>
    <button type="button" data-p="/api/v1/system/clustering/breathing">breathing</button>
    <button type="button" data-p="/api/v1/system/clustering/utility">utility</button>
    <button type="button" data-p="/api/v1/system/clustering/variance">variance</button>
    <button type="button" data-p="/api/v1/system/clustering/runtime-optimization">runtime optimization</button>
  </div>
  <pre id="out">(idle)</pre>
  <script>
    document.querySelectorAll("button[data-p]").forEach(function (btn) {
      btn.onclick = function () {
        fetch(btn.getAttribute("data-p"))
          .then(function (r) { return r.json(); })
          .then(function (j) { document.getElementById("out").textContent = JSON.stringify(j, null, 2); });
      };
    });
  </script>
</body>
</html>
